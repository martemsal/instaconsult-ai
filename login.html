<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaConsult AI | Business Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --bg: #030712; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; display: flex; align-items: center; justify-content: center; height: 100vh; margin:0; }
        .login-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 30px; backdrop-filter: blur(20px); text-align: center; width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .fb-login-btn { background: #1877F2; color: white; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; font-size: 1rem; transition: 0.3s; margin-top: 25px; text-decoration: none; }
        .fb-login-btn:hover { background: #145dbf; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(24, 119, 242, 0.3); }
        .reviewer-access { margin-top: 20px; font-size: 0.8rem; color: #94a3b8; cursor: pointer; border: 1px dashed rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; transition: 0.3s; }
        .reviewer-access:hover { background: rgba(255,255,255,0.05); color: white; border-color: var(--primary); }
        .badge { font-size: 0.7rem; color: #4b5563; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 style="margin:0 0 10px 0; font-weight: 800; font-size: 2.3rem; letter-spacing: -1px;">InstaConsult AI</h1>
        <p style="color: #94a3b8; font-weight: 500; margin:0 0 35px 0;">Strategic Growth Dashboard</p>
        
        <!-- OFFICIAL LOGIN BUTTON (Will work fully after Meta Approval) -->
        <button class="fb-login-btn" onclick="launchLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="22" height="22">
            Login with Instagram Business
        </button>

        <!-- SECURE ACCESS FOR REVIEWERS & VIDEO RECORDING -->
        <div class="reviewer-access" onclick="bypassLogin()">
            🔓 Reviewer Direct Access (Demo Mode)
        </div>

        <p class="badge">Official App ID: 1427626242023896</p>
    </div>

    <script>
        // Official Meta OAuth Flow
        function launchLogin() {
            const appId = '1427626242023896';
            // ATUALIZADO PARA O DOMÍNIO AI360
            const redirectUri = encodeURIComponent('https://instaconsult-ai360.vercel.app/dashboard.html');
            const scope = 'public_profile,email';
            const authUrl = `https://www.facebook.com/v19.0/dialog/oauth?client_id=${appId}&redirect_uri=${redirectUri}&scope=${scope}&response_type=token`;
            
            window.location.href = authUrl;
        }

        // Bypass for Reviewers (Used for Screen Recording and Manual Testing)
        function bypassLogin() {
            const demoData = {
                username: "MetaReviewer",
                insta_handle: "meta_tester",
                niche: "Consulting Verification"
            };
            localStorage.setItem('current_company', JSON.stringify(demoData));
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
