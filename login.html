<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Login | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card glass animate-fade" style="width:400px; margin: 150px auto; padding:40px; text-align:center;">
        <div class="logo" style="font-size:2rem; font-weight:800;">Insta<span>Consult</span>AI</div>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Acesse seu painel estratégico</p>
        <form id="login-form">
            <input type="text" id="login-user" class="form-input" placeholder="Seu usuário" style="margin-bottom:15px; width:100%; border-radius:12px; padding:12px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);" required>
            <input type="password" id="login-pass" class="form-input" placeholder="Sua senha" style="margin-bottom:15px; width:100%; border-radius:12px; padding:12px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);" required>
            <button type="submit" class="btn-growth" style="width:100%; padding:12px; border-radius:12px; background:var(--primary); color:white; font-weight:700; cursor:pointer; border:none;">ACESSAR PAINEL</button>
        </form>
    </div>

    <!-- Script do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SURL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFva2h4bndhcWhkb2tnbmNmZWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTE0OTMsImV4cCI6MjA5MTA2NzQ5M30.plE22Y2TvUuEWMVtwsDfLxeezP6Wk9zpIhlRgruqf60";
        
        // Inicializando Database com nome diferente para evitar conflitos
        const authDb = window.supabase.createClient(SURL, SKEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;

            console.log("Tentando login para:", u);

            const { data, error } = await authDb.from('companies')
                .select('*')
                .eq('username', u)
                .eq('password', p)
                .single();
            
            if (error) {
                console.error("Erro no login:", error.message);
                alert('Usuário ou senha incorretos.');
                return;
            }

            if (data) {
                console.log("Login bem-sucedido!");
                localStorage.setItem('current_company', JSON.stringify(data));
                window.location.href = 'dashboard.html';
            } else {
                alert('Usuário ou senha incorretos.');
            }
        });
    </script>
</body>
</html>
