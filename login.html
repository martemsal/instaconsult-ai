<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <button onclick="check()">TESTAR CONEXÃO AGORA</button>
    <pre id="out"></pre>

    <script>
        const SURL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SKEY = "sb_publishable_slGN_9EvSgmfs-1ilFzO_A_0JXBouTb";
        const client = supabase.createClient(SURL, SKEY);

        async function check() {
            const out = document.getElementById('out');
            out.innerText = "Testando...";

            try {
                // Tenta ler apenas 1 linha de qualquer empresa
                const { data, error, status } = await client
                    .from('companies')
                    .select('id, login')
                    .limit(1);

                if (error) {
                    out.innerText = "ERRO TÉCNICO:\n" + JSON.stringify(error, null, 2) + "\nSTATUS: " + status;
                } else {
                    out.innerText = "CONEXÃO OK!\nDados recebidos: " + JSON.stringify(data, null, 2);
                }
            } catch (e) {
                out.innerText = "ERRO FATAL:\n" + e.message;
            }
        }
    </script>
</body>

</html>
