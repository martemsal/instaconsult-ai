<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaConsult AI | Official Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --bg: #030712; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; display: flex; align-items: center; justify-content: center; height: 100vh; margin:0; }
        .login-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 30px; backdrop-filter: blur(20px); text-align: center; width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .fb-login-btn { background: #1877F2; color: white; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; font-size: 1rem; transition: 0.3s; margin-top: 25px; text-decoration: none; }
        .fb-login-btn:hover { background: #145dbf; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(24, 119, 242, 0.3); }
        .divider { margin: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #0b1120; padding: 0 10px; font-size: 0.8rem; color: #94a3b8; }
        .platform-badge { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; font-size: 0.75rem; color: #94a3b8; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 style="margin:0 0 10px 0; font-weight: 800; font-size: 2.3rem; letter-spacing: -1px;">InstaConsult AI</h1>
        <p style="color: #94a3b8; font-weight: 500; margin:0 0 35px 0;">Growth Marketing Command Center</p>
        
        <div style="text-align: left; padding: 25px; background: rgba(139, 92, 246, 0.08); border-radius: 20px; border: 1px solid rgba(139, 92, 246, 0.2); margin-bottom: 10px;">
            <p style="font-size: 0.85rem; line-height: 1.6; color: #a78bfa; margin:0;">
                🔒 <strong>Verified Entry</strong>: Click the button below to authenticate via Meta's secure servers. This syncs your account insights with our AI growth strategy.
            </p>
        </div>

        <!-- FLUXO DIRETO OAUTH (Elimina erros de JSSDK e Business) -->
        <button class="fb-login-btn" onclick="launchMetaLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="22" height="22">
            Login with Instagram Business
        </button>

        <div class="divider"><span>OAUTH 2.0 PROTOCOL</span></div>
        <div class="platform-badge">
            Official App ID: 1427626242023896 <br>
            Scope: Public Profile & Insights Sync
        </div>
    </div>

    <script>
        function launchMetaLogin() {
            // Configurações do App do Marcelo
            const appId = '1427626242023896';
            
            // Link do seu app na Vercel (onde ele vai voltar após o login)
            const redirectUri = encodeURIComponent('https://instaconsult-ai.vercel.app/dashboard.html');
            
            // Permissões que pedimos para o Review
            const scope = 'public_profile,email';
            
            // A URL Oficial de Login do Facebook (Sem erros de SDK!)
            const facebookLoginUrl = `https://www.facebook.com/v19.0/dialog/oauth?client_id=${appId}&redirect_uri=${redirectUri}&scope=${scope}&response_type=token`;
            
            // Redireciona para o login oficial
            window.location.href = facebookLoginUrl;
        }
    </script>

</body>
</html>
