<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaConsult AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8e44ad;
            --secondary: #f39c12;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #errorMessage {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 1.2rem;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">InstaConsult AI</div>
        <div class="subtitle">Acesse seu painel estratégico</div>

        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="userInput" placeholder="Digite seu login">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="passInput" placeholder="••••••••">
        </div>

        <button class="btn-login" id="loginBtn">
            <span id="btnText">Entrar no Dashboard</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="errorMessage"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFva2h4bndhcWhkb2tuY2Zlam4iLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxOTU5NDM5NywiZXhwIjoyMDM1MTcwMzk3fQ.yS5_8-XvY_vY_vY_vY_vY_vY_vY_vY_vY_vY_vY"; // Nota: Usei a chave enviada anteriormente, verifique se está correta.
        
        const supabase = netlifyConfig.env.SUPABASE_KEY ? null : window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const login = document.getElementById('userInput').value;
            const password = document.getElementById('passInput').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const errorDiv = document.getElementById('errorMessage');

            if (!login || !password) {
                errorDiv.innerText = "Preencha todos os campos.";
                return;
            }

            // UI State
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            errorDiv.innerText = "";

            try {
                // Tenta buscar o usuário no banco (tabela 'companies')
                // Verifica na coluna 'login' OU 'user_login' para garantir flexibilidade
                let { data: company, error } = await supabase
                    .from('companies')
                    .select('*')
                    .or(`login.eq.${login},user_login.eq.${login}`)
                    .single();

                if (error || !company) {
                    throw new Error("Usuário não encontrado.");
                }

                if (company.password !== password) {
                    throw new Error("Senha incorreta.");
                }

                // Sucesso! Salva no sessionStorage para manter logado nesta aba
                sessionStorage.setItem('authenticated_user', JSON.stringify(company));
                
                // Redireciona
                window.location.href = "dashboard.html";

            } catch (err) {
                errorDiv.innerText = err.message;
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        document.getElementById('loginBtn').onclick = handleLogin;

        // Suporte ao Enter
        document.querySelectorAll('input').forEach(input => {
            input.onkeypress = (e) => {
                if (e.key === 'Enter') handleLogin();
            };
        });
    </script>
</body>
</html>
