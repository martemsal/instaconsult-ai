<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Cliente | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0a0514;
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .logo span { color: #833ab4; }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: 'Outfit';
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #833ab4;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(131, 58, 180, 0.2);
        }

        .btn-access {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(45deg, #833ab4, #fd1d1d);
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(131, 58, 180, 0.4);
        }

        #error-msg {
            color: #ff4444;
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass">
        <div class="logo">InstaConsult<span>AI</span></div>
        <h2 style="margin-bottom: 30px; font-weight: 400; opacity: 0.8;">Portal do Cliente</h2>
        
        <input type="text" id="user-login" placeholder="Seu usuário">
        <input type="password" id="user-pass" placeholder="Sua senha">
        
        <button onclick="handleLogin()" class="btn-access">ACESSAR PAINEL</button>

        <p id="error-msg">❌ Usuário ou senha incorretos</p>
        
        <div style="margin-top: 40px; font-size: 0.8rem; opacity: 0.4;">
            &copy; 2024 InstaConsult AI - Todos os direitos reservados.
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SURL = "https://aokhxnwaqhdokgncfejn.supabase.co";
    const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFva2h4bndhcWhkb2tnbmNmZWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTE0OTMsImV4cCI6MjA5MTA2NzQ5M30.plE22Y2TvUuEWMVtwsDfLxeezP6Wk9zpIhlRgruqf60";
    
    // CORREÇÃO: Inicializando o cliente corretamente
    const _supabase = supabase.createClient(SURL, SKEY);

    async function handleLogin() {
        const user = document.getElementById('user-login').value;
        const pass = document.getElementById('user-pass').value;

        if(!user || !pass) return;

        // Tenta buscar a empresa no Supabase
        const { data, error } = await _supabase
            .from('companies')
            .select('*')
            .eq('user_login', user)
            .eq('user_pass', pass)
            .single();

        if (data) {
            localStorage.setItem('current_company', JSON.stringify(data));
            window.location.href = 'dashboard.html'; // Agora vai!
        } else {
            const err = document.getElementById('error-msg');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }
    }
</script>

</body>
</html>
