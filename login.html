<body>
    <button onclick="check()">TESTAR CONEXÃO AGORA</button>
    <pre id="out"></pre>

    <script>
        const SURL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SKEY = "sb_publishable_slGN_9EvSgmfs-1ilFzO_A_0JXBouTb";
        const client = supabase.createClient(SURL, SKEY);

        async function tentarLogar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');

            if (!u || !p) { msg.className = 'error'; msg.innerText = "⚠️ Digite login e senha"; return; }

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";

            try {
                // AGORA USANDO O NOME CORRETO: 'username'
                const { data, error } = await _supabase
                    .from('companies')
                    .select('*')
                    .eq('username', u) // <-- ERA AQUI O ERRO!
                    .eq('password', p)
                    .maybeSingle();

                if (error) throw error;

                if (data) {
                    msg.className = 'success';
                    msg.innerText = "✨ Sucesso! Entrando...";
                    localStorage.setItem('current_company', JSON.stringify(data));
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                } else {
                    throw new Error("Usuário ou senha incorretos.");
                }

            } catch (e) {
                msg.className = 'error';
                msg.innerText = "❌ " + e.message;
                btn.disabled = false;
                btn.innerText = "ACESSAR PAINEL";
            }
        }

    </script>
