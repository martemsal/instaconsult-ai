<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0a0514;
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 380px; /* Largura travada para não transbordar */
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: 'Outfit';
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #833ab4;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-growth {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(131, 58, 180, 0.3);
        }

        .btn-growth:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .fb-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
            min-height: 40px;
            overflow: hidden; /* Corta o excesso do SDK se o botão for muito largo */
        }
    </style>
</head>
<body>

    <!-- SDK do Facebook Profissional -->
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" 
            src="https://connect.facebook.net/pt_BR/sdk.js#xfbml=1&version=v18.0&appId=1263115808730078"></script>

    <div class="glass">
        <h2 style="margin-bottom: 30px; font-weight: 800; font-size: 1.8rem;">Acesso ao Painel</h2>
        
        <input type="text" id="user-login" placeholder="Usuário">
        <input type="password" id="user-pass" placeholder="Senha">
        
        <button onclick="handleLogin()" class="btn-growth">ENTRAR</button>

        <div style="margin: 25px 0 15px; opacity: 0.4; font-size: 0.75rem; letter-spacing: 1px; font-weight: 600;">OU CONECTE VIA META</div>

        <!-- Botão Facebook com Container Controlado -->
        <div class="fb-container">
            <div class="fb-login-button" 
                 data-width="400" 
                 data-size="large" 
                 data-button-type="continue_with" 
                 data-layout="default" 
                 data-auto-logout-link="false" 
                 data-use-continue-as="true"
                 onlogin="checkLoginState();"></div>
        </div>

        <p id="error-msg" style="color:#ff4444; margin-top:15px; display:none; font-size:0.9rem; font-weight:600;">❌ Credenciais inválidas</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SURL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFva2h4bndhcWhkb2tnbmNmZWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTE0OTMsImV4cCI6MjA5MTA2NzQ5M30.plE22Y2TvUuEWMVtwsDfLxeezP6Wk9zpIhlRgruqf60";
        const supabase = supabase.createClient(SURL, SKEY);

        async function handleLogin() {
            const user = document.getElementById('user-login').value;
            const pass = document.getElementById('user-pass').value;

            if(!user || !pass) return;

            const { data, error } = await supabase
                .from('companies')
                .select('*')
                .eq('user_login', user)
                .eq('user_pass', pass)
                .single();

            if (data) {
                localStorage.setItem('current_company', JSON.stringify(data));
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => document.getElementById('error-msg').style.display = 'none', 3000);
            }
        }

        function checkLoginState() {
            FB.getLoginStatus(function(response) {
                if (response.status === 'connected') {
                    window.location.href = 'dashboard.html';
                }
            });
        }
    </script>
</body>
</html>
