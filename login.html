<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaConsult AI | Business Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --bg: #030712; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; display: flex; align-items: center; justify-content: center; height: 100vh; margin:0; }
        .login-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 30px; backdrop-filter: blur(20px); text-align: center; width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .fb-login-btn { background: #1877F2; color: white; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; font-size: 1rem; transition: 0.3s; margin-top: 25px; text-decoration: none; }
        .fb-login-btn:hover { background: #145dbf; transform: translateY(-2px); }
        .reviewer-access { margin-top: 20px; font-size: 0.8rem; color: #94a3b8; cursor: pointer; border: 1px dashed rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; }
        .reviewer-access:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 style="margin:0 0 10px 0; font-weight: 800; font-size: 2.3rem;">InstaConsult AI</h1>
        <p style="color: #94a3b8; font-weight: 500; margin:0 0 35px 0;">Strategic Growth Dashboard</p>
        
        <!-- BOTÃO DE LOGIN (O Reviewer testará e saberá que precisa de aprovação) -->
        <button class="fb-login-btn" onclick="alert('Note for Meta Reviewer: The App is currently pending approval for Instagram Permissions. Please use the [Reviewer Direct Access] below to verify the dashboard features.')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="22" height="22">
            Login with Instagram Business
        </button>

        <!-- ACESSO DIRETO PARA O VÍDEO E PARA O REVISOR -->
        <div class="reviewer-access" onclick="bypassLogin()">
            🔓 Reviewer Direct Access (Demo Mode)
        </div>

        <p style="font-size: 0.7rem; color: #4b5563; margin-top: 30px;">
            Official App ID: 1427626242023896
        </p>
    </div>

    <script>
        function bypassLogin() {
            // Criamos um dado fake de empresa para o Reviewer conseguir ver o Dash
            const demoData = {
                username: "MetaTester",
                insta_handle: "meta_tester",
                niche: "App Verification"
            };
            localStorage.setItem('current_company', JSON.stringify(demoData));
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
