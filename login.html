<!-- login.html completo -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaConsult AI | Official Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Estilos mantidos para consistência visual */
        :root { --primary: #8b5cf6; --bg: #030712; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; display: flex; align-items: center; justify-content: center; height: 100vh; margin:0; }
        .login-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 30px; backdrop-filter: blur(20px); text-align: center; width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .fb-login-btn { background: #1877F2; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; font-size: 1rem; transition: 0.3s; }
        .fb-login-btn:hover { background: #145dbf; transform: translateY(-2px); }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .divider { margin: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #0b1120; padding: 0 10px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

    <!-- SDK DA META (OBRIGATÓRIO PARA O VÍDEO) -->
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId      : '1427626242023896', // ID DO SEU NOVO APP Consult360AI
          cookie     : true,
          xfbml      : true,
          version    : 'v19.0'
        });
      };

      (function(d, s, id){
         var js, fjs = d.getElementsByTagName(s)[0];
         if (d.getElementById(id)) {return;}
         js = d.createElement(s); js.id = id;
         js.src = "https://connect.facebook.net/en_US/sdk.js";
         fjs.parentNode.insertBefore(js, fjs);
       }(document, 'script', 'facebook-jssdk'));

      function launchMetaLogin() {
        FB.login(function(response) {
            if (response.authResponse) {
                console.log('Welcome! Fetching your information.... ');
                // Aqui você pegaria o token e logaria, mas para o vídeo, apenas mostrar o sucesso:
                alert("Login Success! Permissions granted for Review.");
                // Simula o login vindo do Supabase para entrar no Dash
                window.location.href = 'dashboard.html';
            } else {
                console.log('User cancelled login or did not fully authorize.');
            }
        }, {scope: 'instagram_basic,instagram_business_manage_insights,instagram_business_manage_messages,instagram_business_manage_comments,pages_read_engagement,pages_show_list'});
      }
    </script>

    <div class="login-card">
        <h1 style="margin:0 0 10px 0; font-weight: 800; font-size: 2rem;">InstaConsult AI</h1>
        <p style="color: #94a3b8; margin:0 0 40px 0;">Official Meta Partner Access</p>
        
        <button class="fb-login-btn" onclick="launchMetaLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="24" height="24">
            Login with Facebook / Instagram
        </button>

        <div class="divider"><span>OR ADMIN LOGIN</span></div>

        <!-- Login administrativo mantido para sua navegação -->
        <input type="text" id="user" placeholder="Admin Nickname">
        <input type="password" id="pass" placeholder="Security Key">
        <button class="fb-login-btn" style="background: var(--primary);" onclick="window.location.href='dashboard.html'">Enter Dashboard</button>
    </div>

</body>
</html>
