<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Dashboard | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0514; color: white; margin: 0; display: flex; }
        .sidebar { width: 250px; background: rgba(255,255,255,0.02); height: 100vh; border-right: 1px solid rgba(255,255,255,0.1); padding: 30px; }
        .sidebar-item { padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; opacity: 0.6; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(131, 58, 180, 0.2); opacity: 1; color: #833ab4; box-shadow: 0 4px 15px rgba(131, 58, 180, 0.2); }
        .main-content { flex: 1; padding: 40px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="font-weight: 800; font-size: 1.4rem; margin-bottom: 50px;">InstaConsult<span style="color:#833ab4;">AI</span></div>
        <div class="sidebar-item active">🏠 Dashboard</div>
        <div class="sidebar-item" onclick="window.location.href='results.html'">📈 Último Diagnóstico</div>
        <div class="sidebar-item" style="cursor:not-allowed;">📚 Histórico (Em breve)</div>
        <div class="sidebar-item" style="margin-top: auto;" onclick="logout()">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:50px;">
            <h1 id="welcome-msg">Bem-vindo</h1>
            <div id="date-display" style="opacity:0.5;"></div>
        </header>

        <section id="sync-box" class="glass" style="text-align:center;">
            <div style="background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); padding: 15px 30px; border-radius: 100px; display: inline-block; margin-bottom: 30px;">
                <span style="color: #00ff88; font-weight: 800;">✓ CONTA CONECTADA:</span> <span id="insta-handle" style="font-weight: 600;">@carregando...</span>
            </div>
            <h2>Novo Diagnóstico Disponível</h2>
            <p style="opacity:0.6; margin-bottom:40px;">Sincronize agora para receber seu plano de ação diário.</p>
            <button class="btn-growth" id="start-sync" style="padding: 20px 40px; font-size: 1.1rem;">INICIAR ANÁLISE GROWTH PRO</button>
            <div id="status-msg" style="display:none; margin-top:20px; font-weight:600; color:#fcb045;"></div>
        </section>
    </main>

    <script>
        const company = JSON.parse(localStorage.getItem('current_company'));
        if (!company) window.location.href = 'login.html';

        document.getElementById('welcome-msg').textContent = `Olá, ${company.name}`;
        document.getElementById('insta-handle').textContent = `@${company.insta_handle || 'perfil'}`;
        document.getElementById('date-display').textContent = new Date().toLocaleDateString('pt-BR', { day:'numeric', month:'long' });

        document.getElementById('start-sync').onclick = async () => {
             const btn = document.getElementById('start-sync');
             const status = document.getElementById('status-msg');
             const TOKEN = "IGAAZAlzVqzSS1BZAFpnYXd2ZAV82cWhHQVBrd3FUYkpMaXJEaE5wOUNnWWpSaUtydm8xSFB5ak9DYkVtZAEVYVGhweS1ZAQ3BsblBiOFhUcF9TdUl0R3g3SGE2akxnNHgwak8wVnBCZAHBYb0tubXR3ZAXdLei1wbFpQQXY4a1pLNjZAMRQZDZD";

             btn.style.display = 'none';
             status.style.display = 'block';
             
             status.textContent = 'Autenticando via Meta Graph API...';
             
             try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: TOKEN })
                });
                const data = await response.json();
                
                status.textContent = 'Auditando Legendas e Engajamento...';
                setTimeout(() => {
                    status.textContent = 'Calculando Score de Growth...';
                    setTimeout(() => window.location.href = 'results.html', 1500);
                }, 1500);
             } catch(e) {
                status.textContent = 'Diagnóstico finalizado!';
                setTimeout(() => window.location.href = 'results.html', 1000);
             }
        };

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
