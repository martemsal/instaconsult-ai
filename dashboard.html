<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Insights | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0514; color: white; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 60px 40px; text-align: center; }
        .btn-growth { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: white; border: none; border-radius: 12px; padding: 15px 30px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-growth:hover { transform: scale(1.05); filter: brightness(1.2); }
        .dashboard-grid { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
    </style>
</head>
<body>
    <div class="dashboard-grid">
        <nav>
            <div style="font-size: 1.5rem; font-weight: 800;">Insta<span>Consult</span>AI</div>
            <div style="display:flex; gap:20px; align-items:center;">
                <span id="user-display" style="opacity: 0.7;">Olá!</span>
                <button id="logout-btn" style="background:none; border:1px solid rgba(255,255,255,0.2); color:white; padding:8px 15px; border-radius:8px; cursor:pointer;">Sair</button>
            </div>
        </nav>

        <main>
            <div id="sync-box" class="glass">
                <div style="background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); padding: 15px 30px; border-radius: 100px; display: inline-block; margin-bottom: 30px;">
                    <span id="insta-handle" style="font-weight: 800; color:#00ff88;">✓ CONTA VINCULADA: @marcelosaldanhasc</span>
                </div>
                <h2 style="margin-bottom: 10px;">Diagnóstico Pronto</h2>
                <p style="color: rgba(255,255,255,0.6); margin-bottom: 40px;">Sincronize suas métricas para que nossa IA gere o diagnóstico e o seu plano.</p>
                <button class="btn-growth" id="start-sync">SINCRONIZAR INSIGHTS AGORA</button>
                <div id="status-msg" style="display: none; margin-top: 20px; font-weight: 600; color: #fcb045;"></div>
            </div>
        </main>
    </div>

    <script>
    /* TRAVA DE SEGURANÇA: Só entra quem estiver logado */
if (!localStorage.getItem('current_company')) {
    window.location.href = 'login.html';
}

        const company = JSON.parse(localStorage.getItem('current_company'));
        if (!company) window.location.href = 'login.html';
        document.getElementById('user-display').textContent = `Olá, ${company.name}`;

        document.getElementById('start-sync').onclick = async () => {
            const btn = document.getElementById('start-sync');
            const status = document.getElementById('status-msg');
            
            btn.style.display = 'none';
            status.style.display = 'block';
            
            // Fluxo de Inteligência Visual (SaaS Feel)
            status.textContent = 'Iniciando Scanner de IA via Meta Graph...';
            
            setTimeout(() => {
                status.textContent = 'Analizando métricas de @' + (company.insta_handle || 'perfil') + '...';
            }, 1500);

            setTimeout(() => {
                status.textContent = 'Gerando Plano de Ação Personalizado...';
            }, 3000);

            setTimeout(() => {
                status.textContent = 'Diagnóstico Finalizado! Redirecionando...';
                setTimeout(() => window.location.href = 'results.html', 1000);
            }, 4500);
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('current_company'); window.location.href = 'login.html'; };
    </script>
</body>
</html>
