<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Dashboard | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-grid">
        <main class="main-content">
            <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
                <h1 id="company-greeting">Bem-vinda!</h1>
                <button id="logout-btn" style="background:none; border:1px solid var(--border); color:white; padding:8px 15px; border-radius:8px; cursor:pointer;">Sair</button>
            </header>
            <div id="auth-section" class="glass" style="padding:40px; text-align:center;">
                <button class="btn-growth" id="connect-instagram">CONECTAR INSTAGRAM OFICIAL</button>
                <p id="status-feedback" style="margin-top:15px; display:none;"></p>
            </div>
            <div id="analysis-section" class="glass" style="padding:40px; text-align:center; display:none;">
                <h2>Análise Pronta para <span id="sync-target"></span></h2>
                <button class="btn-growth" id="start-analysis" style="margin-top:20px;">SINCRONIZAR INSIGHTS</button>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFva2h4bndhcWhkb2tnbmNmZWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTE0OTMsImV4cCI6MjA5MTA2NzQ5M30.plE22Y2TvUuEWMVtwsDfLxeezP6Wk9zpIhlRgruqf60";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const company = JSON.parse(localStorage.getItem('current_company'));
        if (!company) window.location.href = 'login.html';

        document.getElementById('company-greeting').textContent = `Bem-vinda, ${company.name}`;
        if (company.is_oauth_connected) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('analysis-section').style.display = 'block';
            document.getElementById('sync-target').textContent = '@' + company.insta_handle;
        }

        document.getElementById('connect-instagram').onclick = async () => {
            await supabase.from('companies').update({ is_oauth_connected: true }).eq('id', company.id);
            company.is_oauth_connected = true;
            localStorage.setItem('current_company', JSON.stringify(company));
            location.reload();
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('current_company'); window.location.href = 'login.html'; };
    </script>
</body>
</html>
