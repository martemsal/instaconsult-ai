<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Area | InstaConsult AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-grid { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        .sidebar { padding: 30px; border-right: 1px solid var(--border); }
        .main-panel { padding: 40px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .company-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .company-table th, .company-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="admin-grid">
        <aside class="sidebar glass">
            <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 40px;">Admin<span>AI</span></div>
            <nav>
                <div style="color: var(--primary); margin-bottom: 15px; font-weight: 600;">GERENCIAMENTO</div>
                <div style="color: var(--text-dim); margin-bottom: 10px; cursor: pointer;">Empresas</div>
            </nav>
        </aside>

        <main class="main-panel">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1>Controle de Acessos</h1>
                <button class="btn-growth" id="new-access">+ Novo Acesso</button>
            </header>

            <div class="stats-row">
                <div class="glass" style="padding: 20px;">
                    <div style="color: var(--text-dim);">Total de Clientes</div>
                    <div style="font-size: 2rem; font-weight: 700;" id="total-count">0</div>
                </div>
            </div>

            <section class="glass" style="padding: 25px;">
                <h3>Empresas Habilitadas</h3>
                <table class="company-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>@ Instagram</th>
                            <th>Nicho</th>
                            <th>Usuário Login</th>
                            <th>Senha</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="company-rows"></tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:100;">
        <div class="glass" style="width:400px; padding:30px;">
            <h2 style="margin-bottom:20px;">Novo Acesso</h2>
            <input type="text" id="n-name" class="form-input" placeholder="Nome da Empresa" style="margin-bottom:15px;" required>
            <input type="text" id="n-insta" class="form-input" placeholder="@usuario do Instagram Autorizado" style="margin-bottom:15px;" required>
            <select id="n-niche" class="form-input" style="margin-bottom:15px;">
                <option value="Consultoria">Consultoria</option>
                <option value="Marketing">Marketing</option>
                <option value="Imobiliário">Imobiliário</option>
            </select>
            <input type="text" id="n-username" class="form-input" placeholder="Usuário para Login" style="margin-bottom:15px;" required>
            <input type="text" id="n-password" class="form-input" placeholder="Senha de Acesso" style="margin-bottom:15px;" required>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-growth" id="save" style="flex:1;">Salvar</button>
                <button id="cancel" style="flex:1; background:transparent; border:1px solid var(--border); color:white; border-radius:12px; cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFva2h4bndhcWhkb2tnbmNmZWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTE0OTMsImV4cCI6MjA5MTA2NzQ5M30.plE22Y2TvUuEWMVtwsDfLxeezP6Wk9zpIhlRgruqf60";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const rows = document.getElementById('company-rows');
        const modal = document.getElementById('modal');
        const count = document.getElementById('total-count');

        async function loadCompanies() {
            const { data, error } = await supabase.from('companies').select('*').order('created_at', { ascending: false });
            if (data) {
                rows.innerHTML = data.map(c => `
                    <tr>
                        <td>${c.name}</td>
                        <td>@${c.insta_handle}</td>
                        <td>${c.niche || 'N/A'}</td>
                        <td><strong>${c.username}</strong></td>
                        <td>${c.password}</td>
                        <td><button onclick="del('${c.id}')" style="color:#ff4444; background:none; border:none; cursor:pointer;">Remover</button></td>
                    </tr>
                `).join('');
                count.textContent = data.length;
            }
        }

        window.del = async (id) => {
            if (!confirm("Remover esta conta?")) return;
            await supabase.from('companies').delete().eq('id', id);
            loadCompanies();
        };

        document.getElementById('new-access').onclick = () => modal.style.display = 'flex';
        document.getElementById('cancel').onclick = () => modal.style.display = 'none';

        document.getElementById('save').onclick = async () => {
            const name = document.getElementById('n-name').value;
            const insta_handle = document.getElementById('n-insta').value.replace('@', '');
            const niche = document.getElementById('n-niche').value;
            const username = document.getElementById('n-username').value;
            const password = document.getElementById('n-password').value;

            if (name && username && password && insta_handle) {
                const { error } = await supabase.from('companies').insert([{ name, insta_handle, niche, username, password }]);
                if (error) alert("Erro: " + error.message);
                modal.style.display = 'none';
                loadCompanies();
            } else {
                alert("Preencha tudo!");
            }
        };

        loadCompanies();
    </script>
</body>
</html>
