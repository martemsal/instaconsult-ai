<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8e44ad;
            --bg: #0a0514;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
        }

        .main {
            flex: 1;
            padding: 60px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.9rem;
            padding: 15px;
        }

        td {
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        .btn-new {
            background: linear-gradient(45deg, #8b5cf6, #d946ef);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            float: right;
        }

        .btn-del {
            color: #ff4444;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-del:hover {
            text-decoration: underline;
        }

        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1625;
            padding: 40px;
            border-radius: 24px;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h1 style="font-size: 1.5rem; margin-bottom: 50px;">AdminAI</h1>
        <p style="color: #8b5cf6; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Gerenciamento</p>
        <p>Empresas</p>
    </div>

    <div class="main">
        <button class="btn-new" onclick="toggleModal(true)">+ Novo Acesso</button>
        <h2 style="font-size: 2rem; margin-bottom: 40px;">Controle de Acessos</h2>

        <div class="card">
            <p style="color: #94a3b8; margin:0">Total de Clientes</p>
            <h3 id="totalClients" style="font-size: 2.5rem; margin:10px 0 0 0">0</h3>
        </div>

        <div class="card">
            <h4 style="margin-top: 0;">Empresas Habilitadas</h4>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>@ Instagram</th>
                        <th>Nicho</th>
                        <th>Usuário Login</th>
                        <th>Senha</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="companyTable">
                    <!-- Gerado via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Novo Acesso -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Cadastrar Novo Cliente</h3>
            <input type="text" id="newName" placeholder="Nome Completo">
            <input type="text" id="newHandle" placeholder="@ Instagram">
            <input type="text" id="newNiche" placeholder="Nicho">
            <input type="text" id="newLogin" placeholder="Usuário para Login">
            <input type="text" id="newPass" placeholder="Senha">
            <button onclick="saveCompany()" class="btn-new" style="float:none; width:100%">Salvar Acesso</button>
            <p onclick="toggleModal(false)"
                style="text-align:center; color:#94a3b8; cursor:pointer; margin-top:15px; font-size:0.9rem">Cancelar</p>
        </div>
    </div>

    <script>
        const SURL = "https://aokhxnwaqhdokgncfejn.supabase.co";
        const SKEY = "sb_publishable_slGN_9EvSgmfs-1ilFzO_A_0JXBouTb";
        const supabaseClient = supabase.createClient(SURL, SKEY);

        async function loadCompanies() {
            const { data, error } = await supabaseClient
                .from('companies')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            document.getElementById('totalClients').innerText = data.length;
            const table = document.getElementById('companyTable');
            table.innerHTML = data.map(c => `
                <tr>
                    <td>${c.name}</td>
                    <td>@${c.insta_handle}</td>
                    <td>${c.niche}</td>
                    <td><strong>${c.username || c.login}</strong></td>
                    <td>${c.password}</td>
                    <td><button class="btn-del" onclick="deleteCompany('${c.id}')">Remover</button></td>
                </tr>
            `).join('');
        }

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        async function saveCompany() {
            const company = {
                name: document.getElementById('newName').value,
                insta_handle: document.getElementById('newHandle').value,
                niche: document.getElementById('newNiche').value,
                username: document.getElementById('newLogin').value, // Salva na coluna username
                password: document.getElementById('newPass').value
            };

            const { error } = await supabaseClient.from('companies').insert([company]);
            if (error) return alert("Erro ao salvar: " + error.message);

            alert("Cliente cadastrado!");
            toggleModal(false);
            loadCompanies();
        }

        async function deleteCompany(id) {
            if (!confirm("Remover este acesso permanentemente?")) return;

            const { error } = await supabaseClient
                .from('companies')
                .delete()
                .eq('id', id);

            if (error) return alert("Erro ao remover: " + error.message);

            loadCompanies();
        }

        loadCompanies();
    </script>
</body>

</html>
